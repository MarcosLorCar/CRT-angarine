name: Create Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v1.0.1, etc.

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract project metadata
        run: |
          PROJECT_VERSION=$(grep '^project_version=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          MINECRAFT_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_ENV
          echo "MINECRAFT_VERSION=$MINECRAFT_VERSION" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Package Webserver Zip
        run: |
          mkdir -p crtangarine-webserver/bin
          
          # Copy the shadow jar to the bin folder with a generic name
          cp backend/build/libs/backend-${{ env.PROJECT_VERSION }}.jar crtangarine-webserver/bin/backend.jar
          
          # Create start.bat for Windows users
          cat << 'EOF' > crtangarine-webserver/start.bat
          @echo off
          title CRT-angarine Webserver

          echo Checking for Java...
          java -version >nul 2>&1
          if errorlevel 1 goto NOJAVA

          echo Java found! Starting webserver...
          if not exist bin\backend.jar goto NOJAR

          java -jar bin\backend.jar
          pause
          exit /b

          :NOJAVA
          echo [ERROR] Java is not installed or not configured in your system environment PATH.
          echo This server requires Java 21.
          echo.
          echo Opening download page for Java 21 (Temurin LTS)...
          start https://adoptium.net/temurin/releases/?version=21
          pause
          exit /b

          :NOJAR
          echo [ERROR] bin/backend.jar was not found in this folder!
          echo Please make sure this batch file is in the same folder as the bin directory.
          pause
          exit /b
          EOF
          
          # Create start.sh for Linux/macOS users
          cat << 'EOF' > crtangarine-webserver/start.sh
          #!/bin/bash
          # Change to the script's directory so it runs correctly regardless of where it is invoked
          cd "$(dirname "$0")"

          echo "Checking for Java..."
          if ! command -v java &> /dev/null; then
              echo "[ERROR] Java is not installed or not in PATH."
              echo "Please install Java 21 to run this server."
              exit 1
          fi

          echo "Java found! Starting webserver..."
          if [ ! -f bin/backend.jar ]; then
              echo "[ERROR] bin/backend.jar was not found in this folder!"
              echo "Please make sure this script is in the same folder as the bin directory."
              exit 1
          fi

          java -jar bin/backend.jar
          EOF
          chmod +x crtangarine-webserver/start.sh
          
          # Zip the package folder
          zip -r crtangarine-webserver-v${{ env.PROJECT_VERSION }}.zip crtangarine-webserver

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "[${{ env.MINECRAFT_VERSION }}] ${{ github.ref_name }}"
          body: |
            ### Requirements & Compatibility
            * **Minecraft Version:** ${{ env.MINECRAFT_VERSION }}
            * **Mod Loader:** NeoForge
            * **Java Version:** 21
          files: |
            mod-client/build/libs/crtangarine-client-*.jar
            mod-standalone/build/libs/crtangarine-standalone-*.jar
            crtangarine-webserver-v*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
